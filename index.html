<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0f1220" />
  <title>OB/GYN Revision</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%A9%BA%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="app"><!-- rendered by js/app.js --></div>

  <!--
    Quiz data is loaded via script tags (not fetch) so the app works from file:// too.
    Order matters (Mock Exams tab order: Final 1, Final 2, Exam 1, Exam 2). The tiny
    loader below writes those same tags in order, and — only when the page URL carries
    an "?r=" cache-buster (added by the in-app hard-refresh button) and we're served
    over http(s) — appends it to every asset so the browser refetches fresh copies
    instead of serving stale cached data. On file:// no query is added (file URLs
    don't accept query strings), so opening index.html directly still works.
  -->
  <script>
    (function () {
      var srcs = [
        "data/obs.js",
        "data/gyn.js",
        "data/womens-health.js",
        "data/mock-final.js",
        "data/mock-exam-1.js",
        "data/mock-exam-2.js",
        "data/lecture-tags.js",
        "js/app.js"
      ];
      var http = location.protocol === "http:" || location.protocol === "https:";
      var r = "";
      try { r = new URLSearchParams(location.search).get("r") || ""; } catch (e) {}
      var q = (http && r) ? ("?r=" + encodeURIComponent(r)) : "";
      for (var i = 0; i < srcs.length; i++) {
        document.write('<script src="' + srcs[i] + q + '"><\/script>');
      }
    })();
  </script>
</body>
</html>
